name: iOS Build

on:
  workflow_call:
    inputs:
      new-architecture:
        required: true
        type: number

permissions:
  contents: write

jobs:
  build-ios:
    runs-on: macos-26
    env:
      TURBO_CACHE_DIR: .turbo/ios
      DEVELOPER_DIR: /Applications/Xcode_26.2.app/Contents/Developer
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          # ruby-version is read from example/.ruby-version. bundler-cache:true
          # also runs `bundle install --frozen` against example/Gemfile, so
          # any Gemfile / Gemfile.lock drift fails this step early.
          working-directory: example
          bundler-cache: true

      - name: Setup
        uses: ./.github/actions/setup

      # AppDelegate calls FirebaseApp.configure() unconditionally; the file
      # must exist on disk at archive time. Real plist (vs stub) keeps the
      # smoke build identical to the publish path.
      - name: Inject GoogleService-Info.plist
        env:
          GOOGLE_SERVICE_INFO_PLIST_BASE64: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
        shell: bash
        run: echo "$GOOGLE_SERVICE_INFO_PLIST_BASE64" | base64 -d > example/ios/GoogleService-Info.plist

      - name: Cache turborepo for iOS
        uses: actions/cache@v5
        with:
          path: ${{ env.TURBO_CACHE_DIR }}
          key: ${{ runner.os }}-turborepo-ios-${{ inputs.new-architecture }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-turborepo-ios-${{ inputs.new-architecture }}-

      # Cache Pods/ so pod install short-circuits when Manifest.lock matches
      # Podfile.lock (~2s vs ~30-60s fresh from CDN). Local SDK source isn't
      # in the key: pod install re-evaluates source_files globs and rewrites
      # Pods.xcodeproj on every run, so it can't go stale.
      - name: Cache Pods
        uses: actions/cache@v5
        with:
          path: example/ios/Pods
          key: ${{ runner.os }}-pods-${{ inputs.new-architecture }}-${{ hashFiles('example/ios/Podfile.lock', 'example/Gemfile.lock', 'example/.ruby-version', '*.podspec') }}
          restore-keys: |
            ${{ runner.os }}-pods-${{ inputs.new-architecture }}-

      # Skipped on manual rerun so turbo_cache_hit stays unset and the build
      # step below runs with --force (rerun = force fresh).
      - name: Check turborepo cache for iOS
        if: github.run_attempt == 1
        run: |
          TURBO_CACHE_STATUS=$(node -p "($(yarn turbo run build:ios --cache-dir="${{ env.TURBO_CACHE_DIR }}" --dry=json)).tasks.find(t => t.task === 'build:ios').cache.status")

          if [[ $TURBO_CACHE_STATUS == "HIT" ]]; then
            echo "turbo_cache_hit=1" >> $GITHUB_ENV
          fi

      # Explicit pod install before the build to work around an RN CLI bug:
      # on a fresh runner, its arch detection reads a pbxproj that doesn't
      # exist yet, defaults to legacy, and forces RCT_NEW_ARCH_ENABLED=0 in
      # its subprocess (overriding the shell export). Populating Pods/ first
      # makes the build's auto pod install a fast no-op.
      - name: Install CocoaPods
        if: env.turbo_cache_hit != 1
        working-directory: example/ios
        shell: bash
        run: |
          export RCT_NEW_ARCH_ENABLED=${{ inputs.new-architecture }}
          bundle exec pod install
          rm -f .xcode.env.local

      # --force on rerun bypasses turbo's cache (paired with the run_attempt
      # gate on the probe above).
      - name: Build example for iOS
        shell: bash
        run: |
          export RCT_NEW_ARCH_ENABLED=${{ inputs.new-architecture }}
          yarn turbo run build:ios --cache-dir="${{ env.TURBO_CACHE_DIR }}" ${{ github.run_attempt > 1 && '--force' || '' }}
