name: iOS Build

on:
  workflow_call:
    inputs:
      new-architecture:
        required: true
        type: number

permissions:
  contents: write

jobs:
  build-ios:
    runs-on: macos-26
    env:
      TURBO_CACHE_DIR: .turbo/ios
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '2.6.10'

      - name: Setup
        uses: ./.github/actions/setup

      # Stub Firebase config so Xcode's Resources build phase finds the referenced plist.
      # The real GoogleService-Info.plist is gitignored; integrators add their own
      # (see example/README.md). Stub is enough because the app's AppDelegate guards
      # runtime Firebase init via `if (plistPath) [FIRApp configure]` — CI just needs
      # the file to exist for Xcode's build input validation to pass.
      - name: Stub GoogleService-Info.plist for CI
        run: |
          cat > example/ios/GoogleService-Info.plist <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>BUNDLE_ID</key><string>com.klaviyoreactnativesdkexample</string>
            <key>GOOGLE_APP_ID</key><string>1:000000000000:ios:0000000000000000000000</string>
            <key>API_KEY</key><string>AIzaSyA00000000000000000000000000000000</string>
            <key>GCM_SENDER_ID</key><string>000000000000</string>
            <key>PROJECT_ID</key><string>stub-project</string>
            <key>STORAGE_BUCKET</key><string>stub-project.appspot.com</string>
            <key>PLIST_VERSION</key><string>1</string>
            <key>IS_GCM_ENABLED</key><true/>
            <key>IS_ADS_ENABLED</key><false/>
            <key>IS_ANALYTICS_ENABLED</key><false/>
            <key>IS_APPINVITE_ENABLED</key><false/>
            <key>IS_SIGNIN_ENABLED</key><false/>
          </dict>
          </plist>
          EOF
        shell: bash

      - name: Cache turborepo for iOS
        uses: actions/cache@v5
        with:
          path: ${{ env.TURBO_CACHE_DIR }}
          key: ${{ runner.os }}-turborepo-ios-${{ inputs.new-architecture }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-turborepo-ios-${{ inputs.new-architecture }}-

      - name: Check turborepo cache for iOS
        run: |
          TURBO_CACHE_STATUS=$(node -p "($(yarn turbo run build:ios --cache-dir="${{ env.TURBO_CACHE_DIR }}" --dry=json)).tasks.find(t => t.task === 'build:ios').cache.status")

          if [[ $TURBO_CACHE_STATUS == "HIT" ]]; then
            echo "turbo_cache_hit=1" >> $GITHUB_ENV
          fi

      - name: Install cocoapods
        if: env.turbo_cache_hit != 1
        run: |
          export RCT_NEW_ARCH_ENABLED=${{ inputs.new-architecture }}
          yarn example setup
          rm -f example/ios/.xcode.env.local

      - name: Build example for iOS
        run: |
          yarn turbo run build:ios --cache-dir="${{ env.TURBO_CACHE_DIR }}"
