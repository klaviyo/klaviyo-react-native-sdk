name: iOS Build

on:
  workflow_call:
    inputs:
      new-architecture:
        required: true
        type: number

permissions:
  contents: write

jobs:
  build-ios:
    runs-on: macos-26
    env:
      TURBO_CACHE_DIR: .turbo/ios
      DEVELOPER_DIR: /Applications/Xcode_26.2.app/Contents/Developer
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          # ruby-version is read from example/.ruby-version. bundler-cache:true
          # also runs `bundle install --frozen` against example/Gemfile, so
          # any Gemfile / Gemfile.lock drift fails this step early.
          working-directory: example
          bundler-cache: true

      - name: Setup
        uses: ./.github/actions/setup

      # Real Firebase plist injected from a base64-encoded secret. The example
      # app's AppDelegate guards runtime Firebase init via
      # `if (plistPath) [FIRApp configure]`, but Xcode's Resources build phase
      # still needs the file to exist for build-input validation. Using the
      # real plist (vs a stub) keeps the smoke-test build identical to the
      # publish path.
      - name: Inject GoogleService-Info.plist
        env:
          GOOGLE_SERVICE_INFO_PLIST_BASE64: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
        shell: bash
        run: echo "$GOOGLE_SERVICE_INFO_PLIST_BASE64" | base64 -d > example/ios/GoogleService-Info.plist

      - name: Cache turborepo for iOS
        uses: actions/cache@v5
        with:
          path: ${{ env.TURBO_CACHE_DIR }}
          key: ${{ runner.os }}-turborepo-ios-${{ inputs.new-architecture }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-turborepo-ios-${{ inputs.new-architecture }}-

      # Cache the resolved Pods/ directory so pod install can short-circuit
      # when nothing relevant changed: it sees Pods/Manifest.lock matching
      # Podfile.lock and treats it as a no-op (~2s vs ~30-60s for a fresh
      # download from the CocoaPods CDN).
      #
      # Key invalidates on:
      #   - Podfile.lock     (pod versions)
      #   - Gemfile.lock     (CocoaPods gem version)
      #   - .ruby-version    (Ruby version)
      #   - root podspec(s)  (our local SDK pod definition — source_files glob
      #                       lives here, so glob changes invalidate)
      #
      # Notably *not* in the key: our SDK's iOS source files in `ios/`. For
      # local-path pods, CocoaPods doesn't bundle source into Pods/ — it only
      # adds path references to Pods.xcodeproj that xcodebuild resolves at
      # compile time. So content edits to existing files don't make the
      # cached Pods/ stale. The one exception is adding/removing files
      # matching the podspec's source_files glob: in that case Pods.xcodeproj
      # would be missing/stale references and the new file would silently not
      # be compiled into the pod. Rare in practice — local devs catch it
      # because their own `pod install` regenerates the project — and not
      # worth invalidating the cache on every SDK content edit to defend
      # against.
      - name: Cache Pods
        uses: actions/cache@v5
        with:
          path: example/ios/Pods
          key: ${{ runner.os }}-pods-${{ inputs.new-architecture }}-${{ hashFiles('example/ios/Podfile.lock', 'example/Gemfile.lock', 'example/.ruby-version', '*.podspec') }}
          restore-keys: |
            ${{ runner.os }}-pods-${{ inputs.new-architecture }}-

      # Probe whether turbo would short-circuit the build:ios task. Gated on
      # github.run_attempt == 1 to give us a "rerun = force fresh" lever:
      # on a manual rerun, we skip this probe so turbo_cache_hit stays unset
      # and the build step below gets `--force` (see expression there).
      - name: Check turborepo cache for iOS
        if: github.run_attempt == 1
        run: |
          TURBO_CACHE_STATUS=$(node -p "($(yarn turbo run build:ios --cache-dir="${{ env.TURBO_CACHE_DIR }}" --dry=json)).tasks.find(t => t.task === 'build:ios').cache.status")

          if [[ $TURBO_CACHE_STATUS == "HIT" ]]; then
            echo "turbo_cache_hit=1" >> $GITHUB_ENV
          fi

      # Explicit pod install BEFORE the build, with RCT_NEW_ARCH_ENABLED
      # exported in the shell. This is load-bearing on a fresh runner because
      # `react-native build-ios`'s auto pod install (via cli-platform-apple's
      # createBuild.js) detects arch by checking whether
      # Pods/Pods.xcodeproj/project.pbxproj contains `-DRCT_NEW_ARCH_ENABLED=1`
      # — which on a fresh runner doesn't exist yet, so its getArchitecture()
      # returns false and runPodInstall hard-codes the env var to '0' in the
      # execa call (overriding any shell export). That mismatched arch flag
      # then causes the Podfile's pre_install codegen to skip generating
      # ReactAppDependencyProvider.podspec, and pod install fails on the
      # dangling reference. Running pod install ourselves first populates
      # Pods/ correctly so the auto-install during the build sees
      # Manifest.lock matching Podfile.lock and is essentially a no-op.
      - name: Install CocoaPods
        if: env.turbo_cache_hit != 1
        working-directory: example/ios
        shell: bash
        run: |
          export RCT_NEW_ARCH_ENABLED=${{ inputs.new-architecture }}
          bundle exec pod install
          rm -f .xcode.env.local

      # `react-native build-ios` runs `bundle install` + `bundle exec pod install`
      # automatically (per example/react-native.config.js's
      # automaticPodsInstallation: true). With Pods/ already populated from
      # the step above, that auto-install is fast (Manifest.lock matches
      # Podfile.lock, ~5-10s).
      #
      # `--force` on rerun makes the run_attempt-gated probe above actually
      # mean something: even if turbo's cache restored from this branch's
      # last run, --force ignores it and re-executes build:ios from scratch.
      - name: Build example for iOS
        shell: bash
        run: |
          export RCT_NEW_ARCH_ENABLED=${{ inputs.new-architecture }}
          yarn turbo run build:ios --cache-dir="${{ env.TURBO_CACHE_DIR }}" ${{ github.run_attempt > 1 && '--force' || '' }}
