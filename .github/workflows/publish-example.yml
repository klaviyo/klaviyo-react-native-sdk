# Publish the example app to Play internal track + TestFlight. Android and
# iOS are independent jobs.
#
# Triggers: manual dispatch, release: published, push to master, and
# `pull_request: labeled` when the label is `deploy-example-app` (the
# cleanup-label job below removes it after the run so reapplying re-triggers).

name: Publish Example App

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    branches: [master]
  pull_request:
    types: [labeled]

jobs:
  deploy-android:
    name: Publish to Play Store internal track
    runs-on: ubuntu-24.04
    # On pull_request, only run if the added label is deploy-example-app.
    if: github.event_name != 'pull_request' || github.event.label.name == 'deploy-example-app'

    steps:
      - uses: actions/checkout@v5

      - name: Prep example app
        uses: ./.github/actions/example-publish-prep
        with:
          api_key: ${{ secrets.KLAVIYO_EXAMPLE_API_KEY }}

      # bundleRelease invokes Metro via the RN Gradle plugin; node + yarn must be on PATH.
      - name: Setup
        uses: ./.github/actions/setup

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'
          java-package: jdk

      - name: Add Google Services from Secrets
        run: 'echo "$GOOGLE_SERVICES_JSON" > ./example/android/app/google-services.json'
        shell: bash
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

      - name: Decode upload keystore
        run: echo "$SIGNING_KEY" | base64 -d > "${RUNNER_TEMP}/upload.jks"
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}

      # Read versionName (kept in sync with SDK version by bump-version.sh)
      # so Slack notifications can include it on success or failure.
      - name: Read versionName
        shell: bash
        run: |
          VERSION_NAME=$(grep -oE 'versionName "[^"]+"' example/android/app/build.gradle | head -1 | sed -E 's/versionName "([^"]+)"/\1/')
          echo "Version name: $VERSION_NAME"
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV

      # Auth for the Play Edits API preflight below.
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.SERVICE_ACCOUNT_JSON }}

      # Pick highest+1 versionCode. /edits/{id}/bundles returns ALL bundles
      # for the app, not edit-scoped. The androidpublisher scope is required
      # explicitly — the default cloud-platform scope returns empty.
      - name: Resolve next versionCode from Play
        shell: bash
        env:
          PACKAGE_NAME: com.klaviyoreactnativesdkexample
        run: |
          set -euo pipefail
          TOKEN=$(gcloud auth print-access-token --scopes=https://www.googleapis.com/auth/androidpublisher)
          AUTH="Authorization: Bearer $TOKEN"
          API="https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PACKAGE_NAME"

          # `-f` aborts on HTTP error so we don't silently fall back to
          # HIGHEST=0 and hit a confusing version-code conflict at upload.
          EDIT_ID=$(curl -fsS -X POST -H "$AUTH" -H "Content-Type: application/json" "$API/edits" -d '{}' | jq -r '.id')
          BUNDLES=$(curl -fsS -H "$AUTH" "$API/edits/$EDIT_ID/bundles")
          curl -fsS -X DELETE -H "$AUTH" "$API/edits/$EDIT_ID" >/dev/null

          HIGHEST=$(echo "$BUNDLES" | jq '[.bundles[]?.versionCode // 0] | max // 0')
          NEXT=$(( HIGHEST + 1 ))
          echo "Highest existing versionCode: $HIGHEST"
          echo "Next versionCode: $NEXT"
          echo "VERSION_CODE=$NEXT" >> $GITHUB_ENV

      # Inline signing via -Pandroid.injected.signing.* — AGP produces a
      # properly v2/v3-signed AAB in one pass (Play rejects double-signed AABs).
      - name: Assemble Release Bundle
        shell: bash
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          ALIAS: ${{ secrets.ALIAS }}
          # Prevent Metro from trying to start a dev server during the build
          CI: true
        run: |
          cd example/android && ./gradlew :app:bundleRelease \
            -PreleaseVersionCode=${{ env.VERSION_CODE }} \
            -Pandroid.injected.signing.store.file="${RUNNER_TEMP}/upload.jks" \
            -Pandroid.injected.signing.store.password="${KEY_STORE_PASSWORD}" \
            -Pandroid.injected.signing.key.alias="${ALIAS}" \
            -Pandroid.injected.signing.key.password="${KEY_PASSWORD}"

      # On `release: published`, write the GitHub release body into a
      # `whatsnew-en-US` file so the upload action attaches it as Play Store
      # release notes. Truncate to 500 chars per Google's per-locale cap.
      # Other triggers (workflow_dispatch / push / labeled PR) skip this and
      # the release lands without notes.
      - name: Prepare release notes
        if: github.event_name == 'release'
        shell: bash
        env:
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          mkdir -p "${RUNNER_TEMP}/whatsnew"
          printf '%s' "${RELEASE_BODY}" | head -c 500 > "${RUNNER_TEMP}/whatsnew/whatsnew-en-US"
          echo "WHATSNEW_DIR=${RUNNER_TEMP}/whatsnew" >> "${GITHUB_ENV}"

      - name: Deploy to Internal Track
        id: play_upload
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: com.klaviyoreactnativesdkexample
          releaseFiles: example/android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
          whatsNewDirectory: ${{ env.WHATSNEW_DIR }}

      - name: Clean up keystore
        if: always()
        run: rm -f "${RUNNER_TEMP}/upload.jks"

      - name: Notify Slack on success
        if: success()
        uses: ./.github/actions/notify-slack-publish
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          result: success
          platform: Play Store
          version_label: ${{ env.VERSION_NAME }} (${{ env.VERSION_CODE }})
          # The action emits this for every non-internalsharing track too —
          # it's the standard `play.google.com/apps/test/<pkg>/<code>` URL,
          # only resolvable by users already authorized for the build.
          install_url: ${{ steps.play_upload.outputs.internalSharingDownloadUrl }}

      - name: Notify Slack on failure
        if: failure()
        uses: ./.github/actions/notify-slack-publish
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          result: failure
          platform: Play Store
          version_label: ${{ env.VERSION_NAME || '?' }} (${{ env.VERSION_CODE || '?' }})

  deploy-ios:
    name: Publish to TestFlight
    runs-on: macos-26
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.2.app/Contents/Developer
    if: github.event_name != 'pull_request' || github.event.label.name == 'deploy-example-app'

    steps:
      - uses: actions/checkout@v5

      - name: Prep example app
        uses: ./.github/actions/example-publish-prep
        with:
          api_key: ${{ secrets.KLAVIYO_EXAMPLE_API_KEY }}

      # The RN Xcode build phase invokes Metro during archive; node + yarn must be on PATH.
      - name: Setup
        uses: ./.github/actions/setup

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          # ruby-version is read from example/.ruby-version. bundler-cache:true
          # also runs `bundle install --frozen` against example/Gemfile, so
          # any Gemfile / Gemfile.lock drift fails this step early.
          working-directory: example
          bundler-cache: true

      # Real GoogleService-Info.plist (com.klaviyoreactnativesdkexample) so
      # push delivery works against the published build.
      - name: Inject GoogleService-Info.plist
        env:
          GOOGLE_SERVICE_INFO_PLIST_BASE64: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
        shell: bash
        run: echo "$GOOGLE_SERVICE_INFO_PLIST_BASE64" | base64 -d > example/ios/GoogleService-Info.plist

      # See ios-build.yml's Cache Pods step for the cache-key rationale.
      - name: Cache Pods
        uses: actions/cache@v5
        with:
          path: example/ios/Pods
          key: ${{ runner.os }}-pods-publish-${{ hashFiles('example/ios/Podfile.lock', 'example/Gemfile.lock', 'example/.ruby-version', '*.podspec') }}
          restore-keys: |
            ${{ runner.os }}-pods-publish-

      # --repo-update so stale CDN caches can't pin us to old versions.
      # Delete .xcode.env.local so the Xcode build phase falls back to
      # `command -v node` (resolves to the setup-node binary on $PATH).
      # RCT_NEW_ARCH_ENABLED=1 is required for new-arch codegen to run
      # during pod install — otherwise xcodebuild fails on missing headers
      # like RCTAppDependencyProvider.h.
      - name: Install CocoaPods dependencies
        working-directory: example/ios
        shell: bash
        env:
          RCT_NEW_ARCH_ENABLED: '1'
        run: |
          bundle exec pod install --repo-update
          rm -f .xcode.env.local

      # Apple tools auto-discover the .p8 at this conventional path.
      - name: Write App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        shell: bash
        run: |
          KEY_DIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$KEY_DIR"
          echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 -d > "$KEY_DIR/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          chmod 600 "$KEY_DIR/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"

      # MARKETING_VERSION is kept in sync with the SDK by bump-version.sh.
      - name: Read marketing version
        shell: bash
        run: |
          MARKETING_VERSION=$(grep -m1 'MARKETING_VERSION = ' example/ios/KlaviyoReactNativeSdkExample.xcodeproj/project.pbxproj | awk -F' = ' '{print $2}' | tr -d '; ')
          echo "Marketing version: $MARKETING_VERSION"
          echo "MARKETING_VERSION=$MARKETING_VERSION" >> $GITHUB_ENV

      # Pick latest+1 CFBundleVersion (mirrors the Android preflight). `jwt`
      # is installed inline rather than added to example/Gemfile.
      - name: Resolve next build number from App Store Connect
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          BUNDLE_ID: com.klaviyoreactnativesdkexample
        shell: bash
        run: |
          gem install jwt --no-document --silent
          ruby <<'RUBY'
          require 'jwt'
          require 'json'
          require 'net/http'
          require 'openssl'
          require 'uri'

          key_id    = ENV.fetch('APP_STORE_CONNECT_API_KEY_ID')
          issuer    = ENV.fetch('APP_STORE_CONNECT_API_KEY_ISSUER_ID')
          bundle_id = ENV.fetch('BUNDLE_ID')

          p8_path   = File.expand_path("~/.appstoreconnect/private_keys/AuthKey_#{key_id}.p8")
          private_key = OpenSSL::PKey::EC.new(File.read(p8_path))

          now = Time.now.to_i
          token = JWT.encode(
            { iss: issuer, iat: now, exp: now + 1200, aud: 'appstoreconnect-v1' },
            private_key,
            'ES256',
            { kid: key_id }
          )

          def get(uri, token)
            req = Net::HTTP::Get.new(uri, 'Authorization' => "Bearer #{token}")
            res = Net::HTTP.start(uri.host, uri.port, use_ssl: true) { |h| h.request(req) }
            raise "ASC API #{uri}: HTTP #{res.code}\n#{res.body}" unless res.is_a?(Net::HTTPSuccess)
            JSON.parse(res.body)
          end

          apps = get(URI("https://api.appstoreconnect.apple.com/v1/apps?filter[bundleId]=#{bundle_id}&limit=1"), token)
          raise "No app record in App Store Connect for bundleId=#{bundle_id}. Create the app listing first." if apps['data'].empty?
          app_id = apps['data'][0]['id']

          # Fetch all builds and take the numeric max — `uploadedDate` can
          # be null. limit=200 is the API max; pagination needed past that.
          builds = get(URI("https://api.appstoreconnect.apple.com/v1/builds?filter[app]=#{app_id}&limit=200"), token)
          versions = builds['data'].map { |b| b['attributes']['version'].to_i }
          latest = versions.empty? ? 0 : versions.max
          next_build = latest + 1

          puts "Latest TestFlight build for #{bundle_id}: #{latest}"
          puts "Next build number: #{next_build}"
          File.open(ENV.fetch('GITHUB_ENV'), 'a') { |f| f.puts "BUILD_NUMBER=#{next_build}" }
          RUBY

      # agvtool updates CFBundleVersion across all targets.
      - name: Set build number on project
        working-directory: example/ios
        shell: bash
        run: xcrun agvtool new-version -all "$BUILD_NUMBER"

      # Team ID is stamped from a secret (checked-in plist uses a placeholder).
      # signingCertificate is forced to "Apple Distribution" so exportArchive
      # doesn't fall back to the legacy "iOS Distribution" cert family.
      - name: Stamp signing config into ExportOptions.plist
        working-directory: example/ios
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          /usr/libexec/PlistBuddy -c "Set :teamID ${APPLE_TEAM_ID}" ExportOptions.plist
          # PlistBuddy errors on Add when the key exists, so try Add then Set.
          /usr/libexec/PlistBuddy -c "Add :signingCertificate string Apple Distribution" ExportOptions.plist 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Set :signingCertificate Apple Distribution" ExportOptions.plist

      # Cloud-managed signing: -allowProvisioningUpdates lets xcodebuild
      # register/refresh the distribution cert and provisioning profiles
      # via App Store Connect using the API key flags.
      - name: Archive
        working-directory: example/ios
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          # RN build-phase scripts read this directly to wire codegen outputs.
          RCT_NEW_ARCH_ENABLED: '1'
          # Prevent Metro from starting a dev server.
          CI: true
        shell: bash
        run: |
          # DO NOT `rm -rf ./build` — pod install writes new-arch codegen
          # headers (RCTAppDependencyProvider.h etc.) into ./build/generated/ios
          # and xcodebuild reads them from there during archive.
          rm -rf KlaviyoReactNativeSdkExample.xcarchive
          # `-destination "generic/platform=iOS"` pins archive to iOS device.
          # Without it, xcodebuild picks "My Mac" (Designed-for-iPad scheme
          # on Apple Silicon advertises it as valid) and uses Development
          # signing rules.
          xcodebuild -workspace KlaviyoReactNativeSdkExample.xcworkspace \
            -scheme KlaviyoReactNativeSdkExample \
            -configuration Release \
            -destination "generic/platform=iOS" \
            archive -archivePath KlaviyoReactNativeSdkExample.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID"

      - name: Export IPA
        working-directory: example/ios
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
        shell: bash
        run: |
          xcodebuild -exportArchive \
            -archivePath KlaviyoReactNativeSdkExample.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath ./build \
            -allowProvisioningUpdates \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"

      # altool with the API key — no Apple ID / app-specific password / 2FA dance.
      - name: Upload to TestFlight
        working-directory: example/ios
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
        shell: bash
        run: |
          xcrun altool --upload-app --type ios \
            --file "build/KlaviyoReactNativeSdkExample.ipa" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

      - name: Clean up API key
        if: always()
        shell: bash
        run: rm -rf "$HOME/.appstoreconnect/private_keys"

      - name: Notify Slack on success
        if: success()
        uses: ./.github/actions/notify-slack-publish
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          result: success
          platform: TestFlight
          version_label: ${{ env.MARKETING_VERSION }} (${{ env.BUILD_NUMBER }})

      - name: Notify Slack on failure
        if: failure()
        uses: ./.github/actions/notify-slack-publish
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          result: failure
          platform: TestFlight
          version_label: ${{ env.MARKETING_VERSION || '?' }} (${{ env.BUILD_NUMBER || '?' }})

  # Remove the deploy-example-app label after the run so reapplying re-triggers.
  cleanup-label:
    name: Remove deploy-example-app label
    needs: [deploy-android, deploy-ios]
    if: always() && github.event_name == 'pull_request' && github.event.label.name == 'deploy-example-app'
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write
    steps:
      - name: Remove label
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                name: 'deploy-example-app',
              });
            } catch (e) {
              // 404 = label already gone (e.g. removed manually mid-run).
              if (e.status !== 404) throw e;
            }
