name: Publish SDK to NPM

on:
  release:
    types: [published]

jobs:
  publish-sdk:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - name: Setup
        uses: ./.github/actions/setup

      # No explicit `yarn prepare` step — `npm publish` (via JS-DevTools/npm-publish)
      # runs the `prepare` lifecycle internally before packing, which is where
      # `bob build` produces `lib/`. The composite `Setup` step's `yarn install`
      # also runs `prepare` as a postinstall, so the artifact is built twice
      # already; running it a third time explicitly was wasted CI minutes.
      - uses: JS-DevTools/npm-publish@v3
        with:
          token: ${{ secrets.NPM_TOKEN }}
